name: Deploy Manager

on:
  push:
    branches:
      - editor
    paths:
      - 'src/config/deploy.json'

permissions:
  contents: write

# Serialize all deploy operations to prevent race conditions on shared branches
concurrency:
  group: deploy-operations
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect which deploy was triggered
        id: detect
        run: |
          PREV=$(git show HEAD^:src/config/deploy.json 2>/dev/null || echo '{}')

          PREV_STAGING=$(echo "$PREV" | jq -r '.staging.trigger // 0')
          CURR_STAGING=$(jq -r '.staging.trigger // 0' src/config/deploy.json)
          PREV_PROD=$(echo "$PREV" | jq -r '.production.trigger // 0')
          CURR_PROD=$(jq -r '.production.trigger // 0' src/config/deploy.json)

          echo "Staging trigger:    $PREV_STAGING → $CURR_STAGING"
          echo "Production trigger: $PREV_PROD → $CURR_PROD"

          [ "$PREV_STAGING" != "$CURR_STAGING" ] && STAGING=true || STAGING=false
          [ "$PREV_PROD" != "$CURR_PROD" ]     && PROD=true   || PROD=false

          echo "staging=$STAGING"    >> $GITHUB_OUTPUT
          echo "production=$PROD"    >> $GITHUB_OUTPUT

      - name: Fetch all branches
        run: git fetch --all

      # ── STAGING DEPLOY ────────────────────────────────────────────────────
      - name: "[Staging] Merge editor → staging"
        if: steps.detect.outputs.staging == 'true'
        run: |
          git checkout staging
          git pull origin staging
          if git merge origin/editor --no-ff -m "chore: merge editor → staging [staging-deploy]"; then
            git push origin staging
            echo "✅ Editor merged into staging — Cloudflare staging build triggered"
          else
            git merge --abort
            echo "❌ Merge conflict merging editor into staging. Resolve manually."
            exit 1
          fi

      # ── PRODUCTION DEPLOY ─────────────────────────────────────────────────
      # Only merge editor→staging here if the staging step above didn't already do it
      - name: "[Production] Merge editor → staging"
        if: steps.detect.outputs.production == 'true' && steps.detect.outputs.staging != 'true'
        run: |
          git checkout staging
          git pull origin staging
          if git merge origin/editor --no-ff -m "chore: merge editor → staging [production-deploy]"; then
            git push origin staging
            echo "Merged editor into staging for production deploy"
          else
            git merge --abort
            echo "❌ Merge conflict merging editor into staging. Resolve manually."
            exit 1
          fi

      - name: "[Production] Merge staging → main"
        if: steps.detect.outputs.production == 'true'
        run: |
          git checkout main
          git pull origin main
          if git merge origin/staging --no-ff -m "chore: merge staging → main [production-deploy]"; then
            git push origin main
            echo "✅ Staging merged into main — Cloudflare production build triggered"
          else
            git merge --abort
            echo "❌ Merge conflict merging staging into main. Resolve manually."
            exit 1
          fi

      # Sync main back to staging and editor so all branches stay in sync after production deploy.
      # Best-effort: failures here won't block the deploy that already succeeded.
      - name: "[Production] Sync main → staging"
        if: steps.detect.outputs.production == 'true'
        continue-on-error: true
        run: |
          git checkout staging
          git pull origin staging
          if git merge origin/main --no-ff -m "chore: sync main → staging [post-production]"; then
            git push origin staging
          else
            git merge --abort
            echo "⚠️ Could not auto-sync main into staging after production deploy — resolve manually if needed"
          fi

      - name: "[Production] Sync main → editor"
        if: steps.detect.outputs.production == 'true'
        continue-on-error: true
        run: |
          git checkout editor
          git pull origin editor
          if git merge origin/main --no-ff -m "chore: sync main → editor [post-production]"; then
            git push origin editor
          else
            # If the only conflict is deploy.json (common after production deploy),
            # keep editor's version since editors own that file
            UNRESOLVED=$(git diff --name-only --diff-filter=U)
            OTHER=$(echo "$UNRESOLVED" | grep -v "^src/config/deploy\.json$" | grep -c . || true)
            if [ "$OTHER" -gt 0 ]; then
              git merge --abort
              echo "⚠️ Conflicts in source files — sync main→editor needs manual resolution"
            else
              git checkout HEAD -- src/config/deploy.json
              git add src/config/deploy.json
              git commit -m "chore: sync main → editor [post-production, kept deploy trigger]"
              git push origin editor
            fi
          fi